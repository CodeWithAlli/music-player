<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player ❤️</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

</head>

<body>

<div class="container">

  <!-- SIDEBAR -->

  <div class="sidebar">
    <h3>Playlist</h3>
    <ul id="track-list"></ul>
  </div>

  <!-- PLAYER -->

  <div class="player">

<div class="details">
  <div class="now-playing">ALLISON Y CARLOS</div>
  <div class="track-name">❤️❤️❤️❤️❤️❤️❤️</div>
  <div class="track-artist">- - - - - Para ti - - - - -</div>
</div>

<div class="buttons">
  <div class="prev-track" onclick="prevTrack()">
    <i class="fa fa-step-backward fa-2x"></i>
  </div>

  <div class="playpause-track" onclick="playpauseTrack()">
    <i class="fa fa-play-circle fa-5x"></i>
  </div>

  <div class="next-track" onclick="nextTrack()">
    <i class="fa fa-step-forward fa-2x"></i>
  </div>
</div>

<div class="slider_container">
  <div class="current-time">00:00</div>
  <input type="range" min="0" max="100" value="0" class="seek_slider" onchange="seekTo()">
  <div class="total-duration">00:00</div>
</div>
  </div>

</div>

<script src="main.js"></script>

</body>
</html>
